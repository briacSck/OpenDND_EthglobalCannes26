      <path d="M5.1 7.6 C7.4 5.4, 8.8 2.8, 9.3 0 C11.7 2.4, 12.5 5.5, 11.4 8.8 Z" fill="#515c43" opacity="0.92"/>
      <rect x="5.2" y="8.2" width="1.4" height="5.6" rx="0.7" fill="#877051"/>
    </g>

    <g transform="translate(47 17)" stroke="#caa77a" stroke-width="1.9" stroke-linecap="round">
      <path d="M0 -3.2 V3.2"/>
      <path d="M-3.2 0 H3.2"/>
      <path d="M-2.25 -2.25 L2.25 2.25" opacity="0.78"/>
      <path d="M2.25 -2.25 L-2.25 2.25" opacity="0.78"/>
